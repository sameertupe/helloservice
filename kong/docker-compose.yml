services:
  kong:
    image: kong:3.9
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8190"
      KONG_ADMIN_LISTEN: "0.0.0.0:8191"
      KONG_LOG_LEVEL: info
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    ports:
      - "8190:8190"
      - "8191:8191"
    restart: unless-stopped
