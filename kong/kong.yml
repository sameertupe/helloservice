_format_version: "3.0"

upstreams:
  - name: helloservice-upstream
    algorithm: round-robin
    targets:
      - target: host.docker.internal:8080
      - target: host.docker.internal:8081
      - target: host.docker.internal:8082
      - target: host.docker.internal:8083
      - target: host.docker.internal:8084
      - target: host.docker.internal:8085
      - target: host.docker.internal:8086
      - target: host.docker.internal:8087
      - target: host.docker.internal:8088
      - target: host.docker.internal:8089

services:
  - name: hello-service
    host: helloservice-upstream
    port: 80
    protocol: http
    routes:
      - name: hello-route
        methods:
          - GET
        paths:
          - /hello
        strip_path: false

  - name: pizza-order-service
    host: helloservice-upstream
    port: 80
    protocol: http
    routes:
      - name: pizza-order-route
        methods:
          - POST
        paths:
          - /PlacePizzaOrder
        strip_path: false
